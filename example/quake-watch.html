<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>@marianmeres/vanilla — Quake Watch (fetch · filter · themed severity)</title>
		<meta
			name="description"
			content="Live USGS earthquake feed — fetch, client-side magnitude filter, and severity colors driven entirely by design tokens."
		/>
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌎</text></svg>"
		/>

		<!--
			Styling follows @marianmeres/design-tokens with the Reboot bridge:
			  · reboot.css            — Bootstrap Reboot element normalize/reset (consumes --bs-*)
			  · themes/<name>.css     — one bundled design-tokens theme + reboot bridge.
			                            Each file sets the --app-color-* tokens AND the --bs-*
			                            variables, light on :root, dark on :root.dark.
			                            Generated by themes/_generate.ts.
			  · the inline block below — token-driven example layout (no utility framework).

			THEME SWITCHING is just swapping the active <link> below; LIGHT/DARK is the
			`dark` class on <html>. Regenerate / extend the set with:
			  deno run -A example/themes/_generate.ts
		-->
		<link rel="stylesheet" href="./reboot.css" />
		<link rel="stylesheet" id="theme-link" href="./themes/slate-teal-ocean.css" />

		<!--
			Anti-FOUC: pick the saved theme + dark preference before first paint, so a
			returning visitor doesn't flash the default theme or the wrong mode. The
			module script below re-confirms this idempotently. Key matches THEME_KEY.
		-->
		<script>
			try {
				var saved = JSON.parse(localStorage.getItem("quake-watch-theme") || "null");
				var name = (saved && saved.name) || "slateTealOcean";
				var dark = saved ? !!saved.dark : matchMedia("(prefers-color-scheme: dark)").matches;
				var kebab = name.replace(/([A-Z])/g, "-$1").toLowerCase();
				document.getElementById("theme-link").setAttribute("href", "./themes/" + kebab + ".css");
				document.documentElement.classList.toggle("dark", dark);
			} catch (e) {}
		</script>

		<style>
			:root {
				color-scheme: light;
			}
			:root.dark {
				color-scheme: dark;
			}
			html,
			body {
				height: 100%;
			}
			body {
				min-height: 100vh;
				min-height: 100dvh;
			}

			/* App shell: a viewport-tall flex column. Header + controls + status stay
			   put; only the results list in between scrolls. */
			.app {
				display: flex;
				flex-direction: column;
				height: 100vh;
				height: 100dvh;
				max-width: 44rem;
				margin: 0 auto;
				padding: clamp(1rem, 4vw, 2.25rem) clamp(1rem, 4vw, 1.75rem);
			}
			.app-top {
				flex: none;
			}

			.app-header {
				display: flex;
				align-items: flex-start;
				justify-content: space-between;
				gap: 1rem;
				margin-bottom: 1.25rem;
			}
			.app-header h1 {
				margin: 0 0 0.25rem;
				font-size: 1.15rem;
				font-weight: 600;
				line-height: 1.25;
			}
			.app-header .lead {
				margin: 0;
				max-width: 48ch;
				font-size: 0.85rem;
				color: var(--app-color-muted-foreground);
			}

			/* Theme controls: a <select> over the bundled theme list + a dark toggle. */
			.theme-controls {
				flex: none;
				display: flex;
				align-items: center;
				gap: 0.4rem;
			}
			.theme-select {
				font: inherit;
				font-size: 0.8rem;
				padding: 0.4rem 0.55rem;
				border: 1px solid var(--app-color-border);
				border-radius: 0.5rem;
				background: var(--app-color-input);
				color: var(--app-color-foreground);
				cursor: pointer;
			}
			.icon-btn {
				flex: none;
				width: 2.4rem;
				height: 2.4rem;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				border: 1px solid var(--app-color-border);
				border-radius: 0.5rem;
				background: var(--app-color-surface);
				color: var(--app-color-surface-foreground);
				font-size: 1.05rem;
				line-height: 1;
				cursor: pointer;
			}
			.icon-btn:hover {
				background: var(--app-color-surface-hover);
			}

			/* Segmented controls — buttons that act like a radio group. */
			.toolbar {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 0.5rem 0.9rem;
				margin-bottom: 0.85rem;
			}
			.toolbar-label {
				font-size: 0.72rem;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				color: var(--app-color-muted-foreground);
			}
			.segmented {
				display: inline-flex;
				gap: 0.2rem;
				padding: 0.2rem;
				border: 1px solid var(--app-color-border);
				border-radius: 0.55rem;
				background: var(--app-color-surface);
			}
			.segmented button {
				font: inherit;
				font-size: 0.8rem;
				min-height: 2rem;
				padding: 0 0.7rem;
				border: 0;
				border-radius: 0.4rem;
				background: transparent;
				color: var(--app-color-muted-foreground);
				white-space: nowrap;
				cursor: pointer;
			}
			.segmented button[aria-pressed="true"] {
				background: var(--app-color-primary);
				color: var(--app-color-primary-foreground);
			}
			.segmented button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			.status {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				flex-wrap: wrap;
				margin: 0 0 0.85rem;
				font-size: 0.82rem;
				color: var(--app-color-muted-foreground);
				font-variant-numeric: tabular-nums;
				min-height: 1.5rem;
			}
			.status .count {
				font-weight: 600;
				color: var(--app-color-foreground);
			}
			.spinner {
				display: inline-block;
				width: 0.9rem;
				height: 0.9rem;
				border: 2px solid var(--app-color-muted-foreground);
				border-top-color: transparent;
				border-radius: 50%;
				animation: spin 0.7s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			.refresh {
				margin-left: auto;
				font: inherit;
				font-size: 0.8rem;
				padding: 0.35rem 0.75rem;
				border: 1px solid var(--app-color-border);
				border-radius: 0.5rem;
				background: var(--app-color-surface);
				color: var(--app-color-surface-foreground);
				cursor: pointer;
			}
			.refresh:hover {
				background: var(--app-color-surface-hover);
			}
			.refresh:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			/* Scrolling results region. */
			.results-scroll {
				flex: 1 1 auto;
				min-height: 0;
				overflow-y: auto;
				overscroll-behavior: contain;
				-webkit-overflow-scrolling: touch;
			}
			.results {
				list-style: none;
				margin: 0;
				padding: 0 0 0.5rem;
				display: grid;
				gap: 0.5rem;
			}

			/* A quake card. Severity tiers are pure CSS keyed off [data-sev]: switching
			   theme re-skins them with no JS and no re-render. minor = neutral surface;
			   light/moderate/strong borrow the success / warning / destructive surfaces. */
			.quake {
				display: flex;
				align-items: center;
				gap: 0.8rem;
				padding: 0.7rem 0.85rem;
				border: 1px solid var(--app-color-border);
				border-left: 4px solid var(--app-color-border);
				border-radius: 0.5rem;
				background: var(--app-color-surface);
				color: var(--app-color-surface-foreground);
			}
			.quake[data-sev="light"] {
				border-color: var(--app-color-surface-success-border);
				border-left-color: var(--app-color-success);
				background: var(--app-color-surface-success);
				color: var(--app-color-surface-success-foreground);
			}
			.quake[data-sev="moderate"] {
				border-color: var(--app-color-surface-warning-border);
				border-left-color: var(--app-color-warning);
				background: var(--app-color-surface-warning);
				color: var(--app-color-surface-warning-foreground);
			}
			.quake[data-sev="strong"] {
				border-color: var(--app-color-surface-destructive-border);
				border-left-color: var(--app-color-destructive);
				background: var(--app-color-surface-destructive);
				color: var(--app-color-surface-destructive-foreground);
			}

			/* The magnitude badge uses the solid intent colors (a stronger echo of the
			   card's surface tint). */
			.mag {
				flex: none;
				width: 3rem;
				height: 3rem;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				border-radius: 0.5rem;
				font-weight: 700;
				font-size: 1.05rem;
				line-height: 1;
				background: var(--app-color-muted);
				color: var(--app-color-muted-foreground);
				font-variant-numeric: tabular-nums;
			}
			.quake[data-sev="light"] .mag {
				background: var(--app-color-success);
				color: var(--app-color-success-foreground);
			}
			.quake[data-sev="moderate"] .mag {
				background: var(--app-color-warning);
				color: var(--app-color-warning-foreground);
			}
			.quake[data-sev="strong"] .mag {
				background: var(--app-color-destructive);
				color: var(--app-color-destructive-foreground);
			}
			.mag small {
				font-size: 0.55rem;
				font-weight: 600;
				opacity: 0.8;
				margin-top: 0.1rem;
			}

			.quake-body {
				min-width: 0;
				flex: 1 1 auto;
			}
			.quake-place {
				display: block;
				font-weight: 600;
				font-size: 0.92rem;
				color: inherit;
				text-decoration: none;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			.quake-place:hover {
				text-decoration: underline;
			}
			.quake-meta {
				margin: 0.15rem 0 0;
				font-size: 0.78rem;
				opacity: 0.85;
				display: flex;
				flex-wrap: wrap;
				gap: 0.4rem;
				align-items: center;
			}
			.sev-tag {
				text-transform: uppercase;
				letter-spacing: 0.04em;
				font-size: 0.66rem;
				font-weight: 700;
				padding: 0.1rem 0.35rem;
				border-radius: 0.25rem;
				background: rgb(0 0 0 / 0.08);
			}
			:root.dark .sev-tag {
				background: rgb(255 255 255 / 0.12);
			}

			.empty {
				margin: 0;
				padding: 2rem 1rem;
				border: 1px dashed var(--app-color-border);
				border-radius: 0.5rem;
				text-align: center;
				color: var(--app-color-muted-foreground);
			}
			.error {
				margin: 0 0 0.85rem;
				padding: 0.7rem 0.85rem;
				border: 1px solid var(--app-color-surface-destructive-border);
				border-radius: 0.5rem;
				background: var(--app-color-surface-destructive);
				color: var(--app-color-surface-destructive-foreground);
				font-size: 0.82rem;
			}

			.info {
				flex: none;
				margin: 0;
				padding-top: 0.8rem;
				border-top: 1px solid var(--app-color-border);
				color: var(--app-color-muted-foreground);
				font-size: 0.76rem;
				line-height: 1.6;
			}
			.info a {
				color: inherit;
				text-decoration: underline;
			}

			:where(.theme-select, .icon-btn, .refresh, .segmented button):focus-visible {
				outline: 2px solid var(--app-color-primary);
				outline-offset: 2px;
			}
		</style>
	</head>
	<body>
		<!-- The whole UI lives in templates; the module script clones + wires them. -->
		<template id="tpl-app">
			<div class="app">
				<div class="app-top">
					<header class="app-header">
						<div>
							<h1>🌎 Quake Watch</h1>
							<p class="lead">
								Live earthquakes from the USGS feed. Magnitude drives the
								severity color — switch themes to re-skin it.
							</p>
						</div>
						<div class="theme-controls">
							<select
								class="theme-select"
								data-ref="themeSelect"
								data-on="change:pickTheme"
								aria-label="Color theme"
							></select>
							<button
								type="button"
								class="icon-btn"
								data-ref="darkBtn"
								data-on="click:toggleDark"
								aria-label="Toggle dark mode"
								title="Toggle dark mode"
							>◐</button>
						</div>
					</header>

					<div class="toolbar">
						<span class="toolbar-label">Window</span>
						<div class="segmented" role="group" aria-label="Time window">
							<button data-on="click:setWindow" data-arg="hour">Past hour</button>
							<button data-on="click:setWindow" data-arg="day">Past day</button>
							<button data-on="click:setWindow" data-arg="significant">Significant</button>
						</div>
					</div>

					<div class="toolbar">
						<span class="toolbar-label">Min magnitude</span>
						<div class="segmented" role="group" aria-label="Minimum magnitude">
							<button data-on="click:setMinMag" data-arg="0">All</button>
							<button data-on="click:setMinMag" data-arg="2.5">2.5+</button>
							<button data-on="click:setMinMag" data-arg="4.5">4.5+</button>
							<button data-on="click:setMinMag" data-arg="6">6+</button>
						</div>
					</div>

					<p class="status" role="status" aria-live="polite">
						<span class="spinner" data-ref="spinner" hidden></span>
						<span class="count" data-ref="count">…</span>
						<span data-ref="strongest"></span>
						<span data-ref="fetched"></span>
						<button
							type="button"
							class="refresh"
							data-ref="refreshBtn"
							data-on="click:refresh"
						>↻ Refresh</button>
					</p>

					<p class="error" data-ref="error" hidden>
						Couldn't load the feed —
						<span data-ref="errorMsg"></span>
					</p>
				</div>

				<div class="results-scroll" data-ref="scroll">
					<ul class="results" data-ref="list" aria-label="Earthquakes"></ul>
					<p class="empty" data-ref="empty" hidden>
						No quakes in this window above the selected magnitude.
					</p>
				</div>

				<footer class="info">
					Data:
					<a
						href="https://earthquake.usgs.gov/earthquakes/feed/v1.0/geojson.php"
						target="_blank"
						rel="noopener"
					>USGS Earthquake GeoJSON feeds</a>. Built with
					<a
						href="https://jsr.io/@marianmeres/vanilla"
						target="_blank"
						rel="noopener"
					>@marianmeres/vanilla</a> +
					<a
						href="https://jsr.io/@marianmeres/design-tokens"
						target="_blank"
						rel="noopener"
					>design-tokens</a>.
				</footer>
			</div>
		</template>

		<!-- One quake row, cloned per feature. Severity (`data-sev`) is set in JS;
		     everything else is one-directional data → DOM via applyBindings. -->
		<template id="tpl-quake">
			<li class="quake">
				<div class="mag" data-bind="text:mag"></div>
				<div class="quake-body">
					<a
						class="quake-place"
						data-bind="text:place; href:href"
						target="_blank"
						rel="noopener"
					></a>
					<p class="quake-meta">
						<span class="sev-tag" data-bind="text:sevLabel"></span>
						<span data-bind="text:when"></span>
						<span data-bind="text:depth"></span>
						<span data-bind="text:tsunami; hidden:noTsunami"></span>
					</p>
				</div>
			</li>
		</template>

		<div id="app"></div>

		<!--
			App logic, written exactly how a consumer would: import the built library
			bundle and wire up the view. Build the bundle with:
			  deno task example:build      (or example:watch)
		-->
		<script type="module">
			import {
				applyBindings,
				computed,
				createView,
				delegate,
				fromTemplate,
				observable,
				reactTo,
				refs,
			} from "./dist/bundle.js";

			/* ----------------------------------------------------------------
			 * CONFIG
			 * ---------------------------------------------------------------- */
			const FEED = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/";
			// Two "all magnitudes" windows (so the min-mag filter bites) + one curated
			// "significant" feed (only the notable events of the past month).
			const FEEDS = {
				hour: FEED + "all_hour.geojson",
				day: FEED + "all_day.geojson",
				significant: FEED + "significant_month.geojson",
			};
			// Mirrors example/themes/_generate.ts — the files that exist on disk.
			const THEMES = [
				"slateTealOcean", "indigoAmber", "emeraldPink", "monokaiGreen",
				"monokaiPink", "redSky", "violetLime", "taupeRoseBlush",
				"mistVioletAurora", "stoneOrangeEarth", "rainbow", "zinc",
			];
			const THEME_KEY = "quake-watch-theme";
			const toKebab = (s) => s.replace(/([A-Z])/g, "-$1").toLowerCase();

			/* ----------------------------------------------------------------
			 * GLOBAL STATE — module-level, outlives any view.
			 *
			 *   theme      — { name, dark }; persisted, drives the <link> + dark class.
			 *   windowSel  — which feed to fetch; a CHANGE triggers a network request.
			 *   minMag     — client-side filter; a CHANGE only re-derives, no network.
			 *   request    — the whole request lifecycle in one immutable object.
			 * ---------------------------------------------------------------- */
			const theme = observable(loadTheme());
			const windowSel = observable("day");
			const minMag = observable(0);
			const request = observable({
				status: "idle", // idle | loading | success | error
				quakes: [],
				error: null,
				fetchedAt: 0,
			});

			function loadTheme() {
				try {
					const saved = JSON.parse(localStorage.getItem(THEME_KEY) || "null");
					if (saved && THEMES.includes(saved.name)) {
						return { name: saved.name, dark: !!saved.dark };
					}
				} catch { /* ignore */ }
				return {
					name: "slateTealOcean",
					dark: matchMedia("(prefers-color-scheme: dark)").matches,
				};
			}

			/* ----------------------------------------------------------------
			 * DERIVED — computed fans out only when its result actually changes.
			 *
			 *   isLoading — a boolean for disabling controls.
			 *   visible   — quakes passing the min-mag filter, newest first. Depends on
			 *               BOTH the request and the filter; recomputes when either moves.
			 *   stats     — count + strongest magnitude of the visible set.
			 * ---------------------------------------------------------------- */
			const isLoading = computed([request], () => request.get().status === "loading");

			const visible = computed([request, minMag], () => {
				const m = minMag.get();
				return request
					.get()
					.quakes.filter((q) => (q.mag ?? 0) >= m)
					.sort((a, b) => b.time - a.time);
			});

			const stats = computed([visible], () => {
				const list = visible.get();
				let strongest = -Infinity;
				for (const q of list) strongest = Math.max(strongest, q.mag ?? -Infinity);
				return {
					count: list.length,
					strongest: Number.isFinite(strongest) ? strongest : null,
				};
			});

			/* ----------------------------------------------------------------
			 * LOADER — the async side. One AbortController per call cancels any
			 * in-flight request so rapid window switches / refreshes can't land a
			 * stale response (last-call-wins). We keep the previous quakes visible
			 * while reloading; only a fresh success or a real error replaces them.
			 * ---------------------------------------------------------------- */
			let controller = null;

			async function fetchQuakes() {
				controller?.abort();
				controller = new AbortController();
				const { signal } = controller;

				request.update((s) => ({ ...s, status: "loading", error: null }));
				try {
					const res = await fetch(FEEDS[windowSel.get()], { signal });
					if (!res.ok) {
						throw new Error(`HTTP ${res.status} — ${res.statusText || "feed unavailable"}`);
					}
					const geo = await res.json();
					const quakes = (geo.features ?? []).map((f) => ({
						id: f.id,
						mag: f.properties.mag,
						place: f.properties.place || f.properties.title || "Unknown location",
						time: f.properties.time,
						url: f.properties.url,
						depth: f.geometry?.coordinates?.[2] ?? null,
						tsunami: f.properties.tsunami === 1,
					}));
					request.set({ status: "success", quakes, error: null, fetchedAt: Date.now() });
				} catch (err) {
					if (err?.name === "AbortError") return; // superseded by a newer request
					request.set({
						status: "error",
						quakes: [],
						error: String(err?.message ?? err),
						fetchedAt: Date.now(),
					});
				}
			}

			/* ----------------------------------------------------------------
			 * PRESENTATION HELPERS
			 * ---------------------------------------------------------------- */
			// Magnitude → severity tier. These boundaries line up with the min-mag
			// filter buttons, and each tier maps to a design-token intent color.
			function severity(mag) {
				if (mag == null) return "minor";
				if (mag >= 6) return "strong";
				if (mag >= 4.5) return "moderate";
				if (mag >= 2.5) return "light";
				return "minor";
			}

			const rtf = new Intl.RelativeTimeFormat("en", { numeric: "auto" });
			function timeAgo(ms) {
				const sec = Math.round((Date.now() - ms) / 1000);
				const units = [
					["year", 31536000], ["month", 2592000], ["day", 86400],
					["hour", 3600], ["minute", 60],
				];
				for (const [unit, s] of units) {
					const v = Math.floor(sec / s);
					if (v >= 1) return rtf.format(-v, unit);
				}
				return rtf.format(-sec, "second");
			}

			/* ----------------------------------------------------------------
			 * THE VIEW
			 * ---------------------------------------------------------------- */
			const app = createView((track) => {
				const el = fromTemplate("tpl-app");
				const r = refs(el);

				// Fill the theme picker from the bundled list.
				for (const name of THEMES) {
					const opt = document.createElement("option");
					opt.value = name;
					opt.textContent = name;
					r.themeSelect.appendChild(opt);
				}

				// One delegated listener per event type; data-on/data-arg route it.
				track(
					delegate(el, {
						setWindow: (_e, t) => windowSel.set(t.dataset.arg),
						setMinMag: (_e, t) => minMag.set(+t.dataset.arg),
						refresh: () => fetchQuakes(),
						pickTheme: (_e, t) => theme.update((s) => ({ ...s, name: t.value })),
						toggleDark: () => theme.update((s) => ({ ...s, dark: !s.dark })),
					}),
				);

				// NETWORK: (re)fetch whenever the window changes — and once on mount
				// (reactTo is immediate by default), giving the initial load for free.
				track(reactTo([windowSel], fetchQuakes));

				// LIST: re-render when the visible set changes (new data OR a new
				// min-mag filter). Note what is NOT here: `theme`. Rows are styled
				// purely through CSS tokens, so changing theme never re-renders.
				track(reactTo([visible], renderList));

				function renderList() {
					const list = visible.get();
					r.list.innerHTML = "";
					for (const q of list) {
						const li = fromTemplate("tpl-quake");
						const sev = severity(q.mag);
						li.dataset.sev = sev;
						applyBindings(li, {
							mag: q.mag == null ? "—" : q.mag.toFixed(1),
							place: q.place,
							href: q.url,
							sevLabel: sev,
							when: timeAgo(q.time),
							depth: q.depth == null ? "· depth n/a" : `· ${q.depth.toFixed(0)} km deep`,
							tsunami: "· 🌊 tsunami",
							noTsunami: !q.tsunami,
						});
						r.list.appendChild(li);
					}
					r.empty.hidden = list.length !== 0;
				}

				// STATUS line: count + strongest, straight off the derived `stats`.
				track(
					stats.subscribe(({ count, strongest }) => {
						r.count.textContent = `${count} quake${count === 1 ? "" : "s"}`;
						r.strongest.textContent = strongest == null
							? ""
							: `· strongest M${strongest.toFixed(1)}`;
					}),
				);

				// SPINNER + ERROR + "updated …" react to the request lifecycle.
				track(
					request.subscribe(({ status, error, fetchedAt }) => {
						r.spinner.hidden = status !== "loading";
						r.error.hidden = status !== "error";
						if (status === "error") r.errorMsg.textContent = error;
						r.fetched.textContent = fetchedAt ? `· updated ${timeAgo(fetchedAt)}` : "";
					}),
				);

				// Keep the relative "updated …" label honest without re-rendering rows.
				const tick = setInterval(() => {
					const { fetchedAt } = request.get();
					if (fetchedAt) r.fetched.textContent = `· updated ${timeAgo(fetchedAt)}`;
				}, 15000);
				track(() => clearInterval(tick));

				// DISABLE the window picker + refresh while a request is in flight —
				// fires only when the flag actually flips.
				track(
					isLoading.subscribe((loading) => {
						r.refreshBtn.disabled = loading;
						el.querySelectorAll("[data-on='click:setWindow']")
							.forEach((b) => (b.disabled = loading));
					}),
				);

				// ACTIVE-button highlight: each control subscribes to its own
				// observable and reflects it via aria-pressed (styled in CSS).
				track(
					windowSel.subscribe((w) => {
						el.querySelectorAll("[data-on='click:setWindow']").forEach((b) =>
							b.setAttribute("aria-pressed", String(b.dataset.arg === w))
						);
					}),
				);
				track(
					minMag.subscribe((m) => {
						el.querySelectorAll("[data-on='click:setMinMag']").forEach((b) =>
							b.setAttribute("aria-pressed", String(+b.dataset.arg === m))
						);
					}),
				);

				// Reflect the current theme into the controls (the CSS swap itself is
				// handled page-level, below).
				track(
					theme.subscribe(({ name, dark }) => {
						r.themeSelect.value = name;
						r.darkBtn.textContent = dark ? "☀" : "◐";
						r.darkBtn.title = dark ? "Switch to light" : "Switch to dark";
					}),
				);

				return { el };
			});

			document.getElementById("app").appendChild(app.el);

			/* ----------------------------------------------------------------
			 * THEME (page-lifetime, view-less subscription — like the dark toggle in
			 * todo.html). Swaps the active stylesheet <link> and toggles the `dark`
			 * class on <html>, then persists the choice.
			 *
			 * Flash-free swap: load the new sheet first, drop the old one on its load
			 * event — the page is never left without a token sheet applied.
			 * ---------------------------------------------------------------- */
			let activeLink = document.getElementById("theme-link");

			function setThemeHref(href) {
				if (activeLink.getAttribute("href") === href) return;
				const next = document.createElement("link");
				next.rel = "stylesheet";
				next.href = href;
				next.addEventListener("load", () => activeLink.remove(), { once: true });
				next.addEventListener("error", () => next.remove(), { once: true });
				activeLink.after(next);
				activeLink = next;
			}

			theme.subscribe(({ name, dark }) => {
				document.documentElement.classList.toggle("dark", dark);
				setThemeHref(`./themes/${toKebab(name)}.css`);
				try {
					localStorage.setItem(THEME_KEY, JSON.stringify({ name, dark }));
				} catch { /* ignore */ }
			});

			// Expose for console poking.
			globalThis.app = app;
			globalThis.request = request;
			globalThis.theme = theme;
			globalThis.windowSel = windowSel;
			globalThis.minMag = minMag;
			globalThis.fetchQuakes = fetchQuakes;
		</script>
	</body>
</html>
